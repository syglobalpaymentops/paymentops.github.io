<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exchange One Cost Generator</title>
    <style>
        :root {
            --bg-color: #F5F5F7;
            --card-bg: #FFFFFF;
            --text-main: #1D1D1F;
            --text-muted: #86868B;
            --border-color: #E5E5EA;
            --accent: #000000;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            line-height: 1.5;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 24px;
            letter-spacing: -0.5px;
        }

        .section {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
        }

        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 16px;
            letter-spacing: 1px;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 13px;
            font-weight: 500;
        }

        input[type="number"], input[type="text"], textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-size: 15px;
            background-color: #FAFAFA;
            transition: all 0.2s ease;
            box-sizing: border-box;
            font-family: inherit;
            font-weight: 400; /* 确保不加粗 */
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
            background-color: #FFF;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        /* 专门针对结果输出框，确保纯文本样式 */
        .result-box {
            background-color: #F8F8F8;
            font-family: -apple-system, sans-serif;
            font-size: 14px;
            font-weight: 400; /* 强制正常粗细 */
            color: #000;
            min-height: 160px;
            line-height: 1.6;
        }

        .btn {
            background-color: var(--accent);
            color: #FFF;
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            box-sizing: border-box;
            text-decoration: none; /* 针对a标签 */
        }

        .btn:hover {
            opacity: 0.85;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-outline {
            background-color: transparent;
            color: var(--accent);
            border: 1px solid var(--border-color);
        }

        .btn-outline:hover {
            border-color: var(--accent);
        }

        .link-btn {
            width: auto; 
            padding: 0 16px; 
            white-space: nowrap;
        }

        .hint {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .chart-wrap {
            margin-top: 20px;
        }

        .chart-frame {
            height: 420px;
            border: 1px solid var(--border-color);
            border-radius: 14px;
            overflow: hidden;
            background: #fff;
        }

        .tradingview-widget-copyright {
            padding: 8px 12px 10px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .tradingview-widget-copyright a {
            color: inherit;
            text-decoration: none;
        }

        .tradingview-widget-copyright a:hover {
            text-decoration: underline;
        }

        @media (max-width: 720px) {
            body {
                padding: 24px 14px;
            }

            .section {
                padding: 18px;
            }

            .grid-2,
            .grid-3 {
                grid-template-columns: 1fr;
            }

            .chart-frame {
                height: 360px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Exchange One Cost Generator</h1>

    <div class="section">
        <div class="section-title">1. OCR </div>
        <div class="input-group">
            <textarea id="raw-text" placeholder="paste OCR text."></textarea>
            <button class="btn btn-outline" onclick="smartExtract()" style="margin-top: 8px;">Analyse</button>
        </div>

    </div>

    <div class="section">
        <div class="section-title">2. Data Check</div>
        <div class="grid-3">
            <div class="input-group">
                <label>USD/CNY</label>
                <input type="number" id="v-renmei" step="0.0001" oninput="autoUpdate()">
            </div>
            <div class="input-group">
                <label>USDT/CNY</label>
                <input type="number" id="v-renu" step="0.0001" oninput="autoUpdate()">
            </div>
            <div class="input-group">
                <label>HKD/CNY </label>
                <input type="number" id="v-rengang" step="0.0001" oninput="autoUpdate()">
            </div>
        </div>

        <div class="grid-2" style="margin-top: 20px;">
            <div class="input-group">
                <label>澳人</label>
                <div style="display: flex; gap: 8px;">
                    <input type="number" id="v-aoren" step="0.0001" oninput="autoUpdate()">
                    <a href="https://www.moneychain.com.au/exchange-rates/" target="_blank" class="btn btn-outline link-btn">查价</a>
                </div>
            </div>
            <div class="input-group">
                <label>USD/AUD</label>
                <div style="display: flex; gap: 8px;">
                    <input type="number" id="v-usdaud" step="0.0001" oninput="autoUpdate()">
                    <a href="https://platform.cmcmarkets.com/#/app?b=CMC-CFD&r=AU" target="_blank" class="btn btn-outline link-btn">看盘</a>
                </div>
            </div>
        </div>

        <div class="chart-wrap">
            <div class="section-title">USD/AUD Live Chart</div>
            <div class="chart-frame">
                <!-- TradingView Widget BEGIN -->
                <div class="tradingview-widget-container" style="height:100%;width:100%">
                    <div class="tradingview-widget-container__widget" style="height:calc(100% - 32px);width:100%"></div>
                    <div class="tradingview-widget-copyright"><a href="https://www.tradingview.com/symbols/USDAUD/?exchange=CMCMARKETS" rel="noopener nofollow" target="_blank"><span class="blue-text">USDAUD chart</span></a><span class="trademark"> by TradingView</span></div>
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js" async>
                    {
                    "allow_symbol_change": true,
                    "calendar": false,
                    "details": false,
                    "hide_side_toolbar": true,
                    "hide_top_toolbar": false,
                    "hide_legend": false,
                    "hide_volume": false,
                    "hotlist": false,
                    "interval": "5",
                    "locale": "en",
                    "save_image": true,
                    "style": "1",
                    "symbol": "CMCMARKETS:USDAUD",
                    "theme": "light",
                    "timezone": "Etc/UTC",
                    "backgroundColor": "#ffffff",
                    "gridColor": "rgba(46, 46, 46, 0.06)",
                    "watchlist": [],
                    "withdateranges": false,
                    "compareSymbols": [],
                    "studies": [],
                    "autosize": true
                  }
                    </script>
                </div>
                <!-- TradingView Widget END -->
            </div>
        </div>
    </div>

    <div class="section">
        <div class="section-title">3. PSP/LP Margin</div>
        <div class="grid-2">
            <div class="input-group">
                <label>POBO Margin (%)</label>
                <input type="number" id="m-pobo" step="0.01" value="0.4" oninput="autoUpdate()">
            </div>
            <div class="input-group">
                <label>LP Margin (%)</label>
                <input type="number" id="m-lp" step="0.01" value="0.25" oninput="autoUpdate()">
                <div class="hint" id="lp-hint">辅助：LP USD/AUD: -- | LP AUD/USD: --</div>
            </div>
        </div>
    </div>

    <div class="section">
        <div class="section-title">4. Text Generator </div>
        <textarea id="output-box" class="result-box" readonly>等待数据输入...</textarea>
        <button class="btn" onclick="copyResult()" style="margin-top: 12px;">一键复制文案</button>
    </div>

</div>

<script>
    // --- 1. 智能提取逻辑 ---
    function smartExtract() {
        const text = document.getElementById('raw-text').value;
        if (!text) return;

        const numbers = text.match(/\d+\.\d+/g) || [];
        let renmei = '', renu = '', rengang = '';

        const hkd = numbers.find(n => parseFloat(n) >= 0.1 && parseFloat(n) < 1);
        if (hkd) rengang = hkd;

        const uRegex = /[uU](?:价|成本)?\s*[:：]?\s*([67]\.\d+)/;
        const uMatch = text.match(uRegex);
        
        if (uMatch) {
            renu = uMatch[1];
        }

        const sixSeven = numbers.filter(n => parseFloat(n) >= 6 && parseFloat(n) < 8);
        
        for (let num of sixSeven) {
            if (num !== renu && num !== renmei) {
                if (!renu && num.length > 0) {
                    renmei = num; 
                } else if (!renmei) {
                    renmei = num;
                }
            }
        }

        if (renmei) document.getElementById('v-renmei').value = renmei;
        if (renu) document.getElementById('v-renu').value = renu;
        if (rengang) document.getElementById('v-rengang').value = rengang;

        autoUpdate();
    }

    // --- 2. 核心计算与文案生成 ---
    function autoUpdate() {
        const vRenmei = document.getElementById('v-renmei').value;
        const vRenu = document.getElementById('v-renu').value;
        const vRengang = document.getElementById('v-rengang').value;
        const vAoren = document.getElementById('v-aoren').value;
        const vUsdaud = document.getElementById('v-usdaud').value;
        
        const mPobo = parseFloat(document.getElementById('m-pobo').value || 0) / 100;
        const mLp = parseFloat(document.getElementById('m-lp').value || 0) / 100;

        let poboCost = '待更新';
        let nppCost = '待更新';

        if (vRenu && !isNaN(vRenu)) {
            poboCost = (parseFloat(vRenu) * (1 + mPobo)).toFixed(4);
        }

        if (vUsdaud && !isNaN(vUsdaud)) {
            const lpUsdAud = parseFloat(vUsdaud) * (1 - mLp);
            
            document.getElementById('lp-hint').innerText = `辅助锁汇：LP USD/AUD: ${lpUsdAud.toFixed(4)} | LP AUD/USD: ${(1 / lpUsdAud).toFixed(4)}`;

            if (vRenu && !isNaN(vRenu)) {
                nppCost = (parseFloat(vRenu) / lpUsdAud).toFixed(4);
            }
        } else {
            document.getElementById('lp-hint').innerText = `辅助锁汇：LP USD/AUD: -- | LP AUD/USD: --`;
        }

        const finalTemplate = `今日成本指引：
人美 ${vRenmei || '待更新'}
人美POBO  ${poboCost}
人U ${vRenu || '待更新'}
NPP人澳成本 ${nppCost}
港币 ${vRengang || '待更新'}
澳人 ${vAoren || '待更新'}`;

        // 写入 textarea 的 value
        document.getElementById('output-box').value = finalTemplate;
    }

    // --- 3. 复制功能 (纯文本模式) ---
    function copyResult() {
        const outputBox = document.getElementById('output-box');
        if (outputBox.value.includes('等待数据输入')) return;
        
        // 选中 textarea 里的内容
        outputBox.select();
        outputBox.setSelectionRange(0, 99999); // 适配移动端
        
        try {
            // 执行浏览器内置的复制命令，这样复制出来绝对是纯文本
            document.execCommand('copy');
            alert('文案已成功复制！');
        } catch (err) {
            alert('复制失败，请手动选择复制');
        }
        
        // 取消高亮选中状态
        window.getSelection().removeAllRanges();
    }

    autoUpdate();
</script>

</body>
</html>
