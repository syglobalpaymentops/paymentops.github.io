<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treasury Dashboard Pro</title>
    <style>
        /* ================= Global Reset & Fixes ================= */
        *, *::before, *::after {
            box-sizing: border-box;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            background-color: #e0e3eb; 
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* 4-Quarter Grid Layout */
        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            width: 100vw;
            height: calc(100vh - 48px); 
            gap: 2px;
        }

        .panel {
            background-color: #ffffff;
            width: 100%; height: 100%;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ================= Cost Generator Panel ================= */
        .cost-generator {
            padding: 30px 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between; 
            gap: 24px;
        }

        /* --- Header --- */
        .cg-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #f0f3fa;
            padding-bottom: 16px;
            flex-shrink: 0;
        }
        .cg-header .title { 
            font-size: 18px; 
            font-weight: 800; 
            color: #2962FF; 
            letter-spacing: 1px;
        }
        .cg-header .links {
            display: flex;
            gap: 12px;
        }
        .cg-header .links a {
            font-size: 14px; font-weight: 600; color: #434651; 
            text-decoration: none;
            background: #ffffff; border: 1px solid #d1d4dc; 
            border-radius: 6px; padding: 6px 16px;
            transition: all .2s;
        }
        .cg-header .links a:hover { 
            color: #2962FF; border-color: #2962FF; background: #f0f3fa; 
        }

        /* --- Main Layout (Left Inputs + Right Output) --- */
        .cg-main {
            display: flex;
            gap: 30px;
            flex: 1; 
            min-height: 0;
        }

        /* Left Side: Controls */
        .cg-left {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 24px;
            min-width: 0; 
            justify-content: space-between; 
        }

        /* OCR Input */
        .ocr-row { 
            display: flex; gap: 16px; 
            flex-shrink: 0;
        }
        .ocr-row textarea {
            flex: 1; height: 50px; background: #f8f9fd; border: 1px solid #d1d4dc;
            border-radius: 8px; padding: 12px 16px; font-size: 15px; resize: none;
            color: #131722; transition: border-color 0.2s;
        }
        .ocr-row textarea:focus { outline: none; border-color: #2962FF; }
        .btn-extract { 
            font-size: 15px; font-weight: 600; cursor: pointer; padding: 0 24px; 
            border: 1px solid #d1d4dc; border-radius: 8px; background: #fff; color: #434651;
            transition: all 0.2s;
        }
        .btn-extract:hover { background: #f0f3fa; color: #2962FF; border-color: #2962FF; }
        .btn-clear {
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            border: 1px solid #d1d4dc;
            border-radius: 6px;
            background: #ffffff;
            color: #787b86;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .ocr-row .btn-clear { padding: 0 16px; }
        .btn-clear:hover { background: #fff5f5; color: #d50000; border-color: #ffcdd2; }

        /* Rates & Margins Card */
        .control-card {
            background: #f8f9fd;
            border: 1px solid #e0e3eb;
            border-radius: 12px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            flex: 1;
            justify-content: center;
        }

        /* 修复出框：使用 minmax(0, 1fr) 强制控制列宽边界 */
        .rates-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr)); 
            gap: 20px 16px;
        }
        .input-group { 
            display: flex; align-items: center; gap: 10px; 
        }
        .input-group label { 
            width: 70px; font-size: 14px; color: #787b86; font-weight: 600; text-align: right; flex-shrink: 0;
        }
        .input-group input {
            flex: 1; min-width: 0; width: 100%; padding: 10px 12px; border: 1px solid #d1d4dc;
            border-radius: 6px; font-family: 'Courier New', Courier, monospace; 
            font-size: 16px; font-weight: 700; color: #131722; transition: all 0.2s;
        }
        .input-group input:focus { outline: none; border-color: #2962FF; box-shadow: 0 0 0 2px rgba(41,98,255,0.1); }

        .margin-row {
            display: flex;
            gap: 24px;
            padding-top: 20px;
            border-top: 1px dashed #d1d4dc;
            align-items: center;
        }
        
        /* 核心数据突出显示：LP Highlight Badge */
        .lp-highlight { 
            margin-left: auto; /* 推到最右侧 */
            background: #eef2ff; /* 浅蓝底色 */
            border: 2px solid #2962FF; /* 深蓝强调边框 */
            border-radius: 8px;
            padding: 8px 20px;
            font-size: 16px; 
            color: #2962FF; 
            font-weight: 800; 
            box-shadow: 0 4px 12px rgba(41, 98, 255, 0.15);
            display: flex;
            align-items: center;
            gap: 12px;
            letter-spacing: 0.5px;
        }
        .lp-highlight span {
            color: #131722; /* 具体的数值用黑色强调 */
            font-family: 'Courier New', Courier, monospace;
            font-size: 18px;
        }

        /* Right Side: Output text */
        .cg-right {
            width: 280px; 
            display: flex;
            flex-direction: column;
            gap: 16px;
            flex-shrink: 0;
        }
        .output-area {
            flex: 1; background: #f8f9fd; border: 1px solid #e0e3eb;
            border-radius: 12px; padding: 20px; font-size: 15px; line-height: 1.8; 
            resize: none; color: #131722; outline: none;
        }
        .btn-copy {
            background: #2962FF; color: #fff; border: none; border-radius: 8px;
            padding: 14px; font-size: 15px; font-weight: 700; cursor: pointer;
            transition: background 0.2s; flex-shrink: 0;
        }
        .btn-copy:hover { background: #1e53e5; }

        /* --- Excel-like Workspace (Bottom) --- */
        .excel-section {
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            height: 168px;
            min-height: 0;
        }
        .excel-title { 
            font-size: 13px; color: #787b86; margin-bottom: 6px;
            display: flex; justify-content: space-between; align-items: center; font-weight: 600;
        }
        .excel-title-left {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
        }
        .excel-title .btn-clear {
            padding: 4px 10px;
        }
        .excel-status {
            color: #2962FF;
            max-width: 58%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            text-align: right;
        }
        .excel-wrapper {
            border: 1px solid #d1d4dc;
            border-radius: 8px;
            overflow: hidden;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            min-height: 0;
            flex: 1;
        }
        .formula-row {
            display: grid;
            grid-template-columns: 74px 34px minmax(0, 1fr);
            align-items: center;
            background: #f8f9fd;
            border-bottom: 1px solid #d1d4dc;
            min-height: 34px;
        }
        .name-box {
            height: 100%;
            border: none;
            border-right: 1px solid #d1d4dc;
            background: #ffffff;
            color: #434651;
            font-size: 13px;
            font-weight: 700;
            text-align: center;
            outline: none;
        }
        .fx-label {
            color: #787b86;
            font-style: italic;
            font-weight: 700;
            text-align: center;
            border-right: 1px solid #d1d4dc;
            user-select: none;
        }
        .formula-input {
            height: 100%;
            border: none;
            padding: 0 10px;
            color: #131722;
            font: 14px "Courier New", Courier, monospace;
            outline: none;
        }
        .sheet-viewport {
            flex: 1;
            min-height: 0;
            overflow: auto;
            background: #ffffff;
        }
        .excel-grid {
            display: grid;
            grid-template-columns: 42px repeat(10, minmax(86px, 1fr));
            grid-auto-rows: 28px;
            min-width: 902px;
            background: #d1d4dc;
            gap: 1px;
        }
        .sheet-corner,
        .col-header,
        .row-header {
            background: #f0f3fa;
            color: #434651;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            user-select: none;
        }
        .col-header.active,
        .row-header.active {
            background: #dbe6ff;
            color: #2962FF;
        }
        .excel-cell {
            width: 100%;
            height: 100%;
            border: none;
            background: #ffffff;
            padding: 0 8px;
            color: #131722;
            font: 14px "Courier New", Courier, monospace;
            outline: none;
            transition: background .1s;
        }
        .excel-cell:focus {
            background: #ffffff;
            color: #131722;
            box-shadow: inset 0 0 0 2px #2962FF;
            position: relative;
            z-index: 2;
        }
        .excel-cell.formula {
            color: #00897b;
        }
        .excel-cell.error {
            color: #d50000;
            background: #fff5f5;
        }
        .excel-cell.ref-active {
            background: #eef7ff;
            box-shadow: inset 0 0 0 2px #00a3ff;
        }
    </style>
</head>
<body>

<div class="dashboard">

<script>
    // --- Standard Input Calc (For Rates Panel) ---
    function parseExcelMath(str) {
        if (!str) return 0;
        let expr = str.toString().trim();
        if (expr.startsWith('=')) expr = expr.substring(1); 
        if (/^[\d\.\+\-\*\/\(\)\s]+$/.test(expr)) {
            try {
                let result = Function('"use strict";return (' + expr + ')')();
                return result === undefined || isNaN(result) ? 0 : result;
            } catch { return 0; }
        }
        return parseFloat(str) || 0;
    }

    function evalStandard(el) {
        if (!el.value) return;
        let val = parseExcelMath(el.value);
        if (val) el.value = Math.round(val * 100000) / 100000;
        if (el.id.startsWith('v-') || el.id.startsWith('m-')) autoUpdate();
    }

    document.querySelectorAll('.input-group input').forEach(input => {
        input.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') this.blur();
        });
    });

    // --- Excel-like Grid ---
    const gridData = {};
    const cols = ['A', 'B', 'C', 'D', 'E', 'F'];
    for (let i = 6; i < 10; i++) cols.push(String.fromCharCode(65 + i));
    const rows = 20;
    let activeCell = null;
    let formulaEditing = false;
    let formulaRefSelection = null;

    function cellId(colIndex, rowIndex) {
        return cols[colIndex] + rowIndex;
    }

    function parseCellId(id) {
        const match = id.match(/^([A-J])(\d{1,2})$/);
        if (!match) return null;
        return { col: cols.indexOf(match[1]), row: parseInt(match[2], 10) };
    }

    function showStatus(text) {
        document.getElementById('sheet-status').innerText = text;
    }

    function initExcel() {
        const container = document.getElementById('excel-grid');
        container.innerHTML = '';

        const corner = document.createElement('div');
        corner.className = 'sheet-corner';
        container.appendChild(corner);

        cols.forEach(col => {
            const header = document.createElement('div');
            header.className = 'col-header';
            header.id = `col-${col}`;
            header.innerText = col;
            container.appendChild(header);
        });

        for (let r = 1; r <= rows; r++) {
            const rowHeader = document.createElement('div');
            rowHeader.className = 'row-header';
            rowHeader.id = `row-${r}`;
            rowHeader.innerText = r;
            container.appendChild(rowHeader);

            for (let c = 0; c < cols.length; c++) {
                const id = cellId(c, r);
                gridData[id] = { exp: '', val: '' };
                const input = document.createElement('input');
                input.id = id;
                input.className = 'excel-cell';
                input.dataset.cell = id;
                input.autocomplete = 'off';
                input.spellcheck = false;
                
                input.onfocus = () => selectCell(input);
                input.oninput = () => {
                    clearFormulaRefSelection();
                    gridData[id].exp = input.value;
                    document.getElementById('formula-bar').value = input.value;
                };
                input.onblur = () => commitCell(input);
                input.onkeydown = (e) => handleCellKey(e, input);
                input.onpaste = (e) => pasteIntoGrid(e, id);
                input.onmousedown = (e) => {
                    const bar = document.getElementById('formula-bar');
                    const formulaText = formulaEditing ? bar.value : activeCell?.value || '';
                    if (activeCell && activeCell !== input && shouldAppendCellRef(formulaText)) {
                        e.preventDefault();
                        appendCellRef(id);
                        activeCell.focus();
                    }
                };
                container.appendChild(input);
            }
        }

        const bar = document.getElementById('formula-bar');
        bar.onfocus = () => { formulaEditing = true; };
        bar.oninput = () => {
            if (!activeCell) return;
            clearFormulaRefSelection();
            activeCell.value = bar.value;
            gridData[activeCell.id].exp = bar.value;
        };
        bar.onkeydown = (e) => {
            if (!activeCell) return;
            if (e.key === 'Enter') {
                e.preventDefault();
                commitCell(activeCell);
                moveActiveCell(0, 1);
            } else if (e.key === 'Escape') {
                e.preventDefault();
                bar.value = gridData[activeCell.id].exp;
                activeCell.focus();
            }
        };
        bar.onblur = () => { formulaEditing = false; refreshGrid(); };

        selectCell(document.getElementById('A1'));
        refreshGrid();
    }

    function selectCell(input) {
        if (!input) return;
        if (activeCell !== input) clearFormulaRefSelection();
        activeCell = input;
        document.querySelectorAll('.col-header.active, .row-header.active').forEach(el => el.classList.remove('active'));
        const pos = parseCellId(input.id);
        if (pos) {
            document.getElementById(`col-${cols[pos.col]}`)?.classList.add('active');
            document.getElementById(`row-${pos.row}`)?.classList.add('active');
        }
        document.getElementById('name-box').value = input.id;
        document.getElementById('formula-bar').value = gridData[input.id].exp;
        input.value = gridData[input.id].exp;
        showStatus('Use =A1+B1, =SUM(A1:B3), paste from Excel');
    }

    function shouldAppendCellRef(text) {
        const value = (text || '').trim();
        if (!value.startsWith('=')) return false;
        return /(?:=|[\+\-\*\/\(,:])\s*$/.test(value);
    }

    function clearFormulaRefSelection() {
        if (formulaRefSelection?.refId) {
            document.getElementById(formulaRefSelection.refId)?.classList.remove('ref-active');
        }
        formulaRefSelection = null;
    }

    function setFormulaRefSelection(refId, start, end) {
        if (formulaRefSelection?.refId) {
            document.getElementById(formulaRefSelection.refId)?.classList.remove('ref-active');
        }
        formulaRefSelection = { formulaCellId: activeCell.id, refId, start, end };
        document.getElementById(refId)?.classList.add('ref-active');
    }

    function appendCellRef(id, replaceCurrent = false) {
        if (!activeCell) return;
        const bar = document.getElementById('formula-bar');
        const target = formulaEditing ? bar : activeCell;
        const canReplace = replaceCurrent && formulaRefSelection?.formulaCellId === activeCell.id;
        const start = canReplace ? formulaRefSelection.start : target.selectionStart ?? target.value.length;
        const end = canReplace ? formulaRefSelection.end : target.selectionEnd ?? target.value.length;
        const nextValue = target.value.slice(0, start) + id + target.value.slice(end);

        activeCell.value = nextValue;
        bar.value = nextValue;
        gridData[activeCell.id].exp = nextValue;

        const nextPos = start + id.length;
        setFormulaRefSelection(id, start, nextPos);
        setTimeout(() => {
            target.focus();
            target.setSelectionRange(nextPos, nextPos);
        }, 0);
    }

    function commitCell(input) {
        if (!input) return;
        clearFormulaRefSelection();
        gridData[input.id].exp = input.value;
        refreshGrid();
    }

    function handleCellKey(e, input) {
        const nav = {
            ArrowUp: [0, -1],
            ArrowDown: [0, 1],
            ArrowLeft: [-1, 0],
            ArrowRight: [1, 0],
            Tab: [e.shiftKey ? -1 : 1, 0],
            Enter: [0, e.shiftKey ? -1 : 1]
        };
        if (!nav[e.key]) return;
        const isEditingFormulaRef = formulaRefSelection?.formulaCellId === input.id;
        if (e.key.startsWith('Arrow') && input.value.trim().startsWith('=') && (shouldAppendCellRef(input.value) || isEditingFormulaRef)) {
            e.preventDefault();
            appendNeighborRef(nav[e.key][0], nav[e.key][1]);
            return;
        }
        e.preventDefault();
        commitCell(input);
        moveActiveCell(nav[e.key][0], nav[e.key][1]);
    }

    function moveActiveCell(colDelta, rowDelta) {
        if (!activeCell) return;
        const pos = parseCellId(activeCell.id);
        if (!pos) return;
        const nextCol = Math.max(0, Math.min(cols.length - 1, pos.col + colDelta));
        const nextRow = Math.max(1, Math.min(rows, pos.row + rowDelta));
        document.getElementById(cellId(nextCol, nextRow))?.focus();
    }

    function appendNeighborRef(colDelta, rowDelta) {
        if (!activeCell) return;
        const baseId = formulaRefSelection?.formulaCellId === activeCell.id ? formulaRefSelection.refId : activeCell.id;
        const pos = parseCellId(baseId);
        if (!pos) return;
        const nextCol = Math.max(0, Math.min(cols.length - 1, pos.col + colDelta));
        const nextRow = Math.max(1, Math.min(rows, pos.row + rowDelta));
        const ref = cellId(nextCol, nextRow);
        if (ref !== activeCell.id) appendCellRef(ref, formulaRefSelection?.formulaCellId === activeCell.id);
    }

    function pasteIntoGrid(e, startId) {
        const text = e.clipboardData?.getData('text');
        if (!text || (!text.includes('\t') && !text.includes('\n'))) return;
        e.preventDefault();
        const start = parseCellId(startId);
        if (!start) return;
        text.trimEnd().split(/\r?\n/).forEach((line, rOffset) => {
            line.split('\t').forEach((value, cOffset) => {
                const col = start.col + cOffset;
                const row = start.row + rOffset;
                if (col >= cols.length || row > rows) return;
                gridData[cellId(col, row)].exp = value;
            });
        });
        refreshGrid();
        document.getElementById(startId)?.focus();
        showStatus('Pasted');
    }

    function getCellNumber(id, stack = []) {
        if (stack.includes(id)) throw new Error('CIRC');
        const cell = gridData[id];
        if (!cell) return 0;
        const result = evaluateCell(id, [...stack, id]);
        const num = parseFloat(result);
        return isNaN(num) ? 0 : num;
    }

    function getRangeValues(start, end, stack = []) {
        const a = parseCellId(start);
        const b = parseCellId(end);
        if (!a || !b) return [];
        const values = [];
        const colMin = Math.min(a.col, b.col);
        const colMax = Math.max(a.col, b.col);
        const rowMin = Math.min(a.row, b.row);
        const rowMax = Math.max(a.row, b.row);
        for (let r = rowMin; r <= rowMax; r++) {
            for (let c = colMin; c <= colMax; c++) {
                values.push(getCellNumber(cellId(c, r), stack));
            }
        }
        return values;
    }

    function evaluateCell(id, stack = []) {
        const exp = gridData[id].exp.trim();
        if (!exp) return '';
        if (!exp.startsWith('=')) {
            const num = parseFloat(exp);
            return /^-?\d+(\.\d+)?$/.test(exp) ? num : exp;
        }

        try {
            let code = exp.substring(1).toUpperCase();
            const ranges = [];
            code = code.replace(/\b([A-J]\d{1,2}):([A-J]\d{1,2})\b/g, (_, a, b) => {
                const key = `__R${ranges.length}__`;
                ranges.push([key, `RANGE('${a}','${b}')`]);
                return key;
            });
            code = code.replace(/\b([A-J]\d{1,2})\b/g, "CELL('$1')");
            ranges.forEach(([key, value]) => { code = code.replace(key, value); });
            if (!/^[0-9A-Z_\.\+\-\*\/\(\),'\s]+$/.test(code)) throw new Error('BAD');
            const SUM = (...args) => args.flat().reduce((a, b) => a + (parseFloat(b) || 0), 0);
            const AVERAGE = (...args) => {
                const nums = args.flat().map(Number).filter(n => !isNaN(n));
                return nums.length ? SUM(nums) / nums.length : 0;
            };
            const MIN = (...args) => Math.min(...args.flat().map(Number).filter(n => !isNaN(n)));
            const MAX = (...args) => Math.max(...args.flat().map(Number).filter(n => !isNaN(n)));
            const CELL = ref => getCellNumber(ref, stack);
            const RANGE = (a, b) => getRangeValues(a, b, stack);
            const result = Function('SUM', 'AVERAGE', 'MIN', 'MAX', 'ROUND', 'ABS', 'CELL', 'RANGE', `"use strict";return (${code})`)(SUM, AVERAGE, MIN, MAX, Math.round, Math.abs, CELL, RANGE);
            return typeof result === 'number' && isFinite(result) ? Math.round(result * 100000) / 100000 : result;
        } catch {
            return '#ERR';
        }
    }

    function refreshGrid() {
        Object.keys(gridData).forEach(id => {
            gridData[id].val = evaluateCell(id);
        });
        for (let id in gridData) {
            const el = document.getElementById(id);
            if (!el) continue;
            el.classList.toggle('formula', gridData[id].exp.trim().startsWith('='));
            el.classList.toggle('error', gridData[id].val === '#ERR');
            if (document.activeElement !== el && document.activeElement !== document.getElementById('formula-bar')) {
                el.value = gridData[id].val ?? '';
            } else if (gridData[id].exp === '') {
                el.value = '';
            }
        }
    }

    function clearExcelGrid() {
        clearFormulaRefSelection();
        Object.keys(gridData).forEach(id => {
            gridData[id].exp = '';
            gridData[id].val = '';
            const el = document.getElementById(id);
            if (el) {
                el.value = '';
                el.classList.remove('formula', 'error', 'ref-active');
            }
        });
        document.getElementById('formula-bar').value = '';
        showStatus('Cleared');
        document.getElementById('A1')?.focus();
    }

    // --- Main Calculation Logic ---
    function normalizeHkdRate(raw) {
        if (!raw) return '';
        const cleaned = raw.toString().replace(/[^\d.]/g, '');
        if (!cleaned) return '';
        const num = parseFloat(cleaned);
        if (!isNaN(num) && num >= 0.7 && num < 1) return num.toFixed(4);

        const digits = cleaned.replace(/\D/g, '');
        if (/^0?\d{4}$/.test(digits)) {
            const rate = parseInt(digits, 10) / 10000;
            return rate >= 0.7 && rate < 1 ? rate.toFixed(4) : '';
        }
        return '';
    }

    function smartExtract() {
        const text = document.getElementById('raw-text').value;
        if (!text) return;
        const nums = text.match(/\d+(?:\.\d+)?/g) || [];
        let renmei = '', renu = '', rengang = '';
        
        const hkHint = text.match(/(?:港币|港幣|港|HKD)[^\d]*(0?\d{4}|0?\.\d{3,5})/i);
        if (hkHint) rengang = normalizeHkdRate(hkHint[1]);
        if (!rengang) {
            const hkVal = nums.map(normalizeHkdRate).find(Boolean);
            if (hkVal) rengang = hkVal;
        }
        
        const uVal = text.match(/[uU](?:价|成本)?\s*[:：]?\s*([67]\.\d+)/);
        if (uVal) renu = uVal[1];
        
        const mainVal = nums.find(n => parseFloat(n) >= 6 && n !== renu);
        if (mainVal) renmei = mainVal;

        if (renmei) document.getElementById('v-renmei').value = renmei;
        if (renu)   document.getElementById('v-renu').value = renu;
        if (rengang) document.getElementById('v-rengang').value = rengang;
        autoUpdate();
    }

    function clearCostGenerator() {
        document.getElementById('raw-text').value = '';
        ['v-renmei', 'v-renu', 'v-rengang', 'v-aoren', 'v-usdaud'].forEach(id => {
            document.getElementById(id).value = '';
        });
        document.getElementById('m-pobo').value = '0.4';
        document.getElementById('m-lp').value = '0.25';
        autoUpdate();
    }

    function autoUpdate() {
        const getV = (id) => parseExcelMath(document.getElementById(id).value);
        
        const u = getV('v-renu');
        const usdaud = getV('v-usdaud');
        const p = getV('m-pobo') / 100;
        const l = getV('m-lp') / 100;
        
        let poboCost = '—', nppCost = '—';
        
        if (u) poboCost = (u * (1 + p)).toFixed(4);
        
        if (usdaud) {
            const lpRate = usdaud * (1 - l);
            // 写入新的强调版样式结构
            document.getElementById('lp-hint').innerHTML = `LP Rate: <span>${lpRate.toFixed(4)}</span> &nbsp;|&nbsp; A/U: <span>${(1/lpRate).toFixed(4)}</span>`;
            if (u) nppCost = (u / lpRate).toFixed(4);
        } else {
            document.getElementById('lp-hint').innerHTML = `LP Rate: <span>—</span> &nbsp;|&nbsp; A/U: <span>—</span>`;
        }

        const txtRenmei = document.getElementById('v-renmei').value || '—';
        const txtRenu = document.getElementById('v-renu').value || '—';
        const txtRengang = document.getElementById('v-rengang').value || '—';
        const txtAoren = document.getElementById('v-aoren').value || '—';

        document.getElementById('output-box').value = 
`今日成本指引：
人美 ${txtRenmei}
人美POBO ${poboCost}
人U ${txtRenu}
NPP人澳成本 ${nppCost}
港币 ${txtRengang}
澳人 ${txtAoren}`;
    }

    function copyResult() {
        const box = document.getElementById('output-box');
        box.select(); box.setSelectionRange(0, 99999);
        try {
            document.execCommand('copy');
            const btn = document.querySelector('.btn-copy');
            const origText = btn.innerText;
            btn.innerText = 'Copied ✓';
            btn.style.background = '#00c853'; 
            setTimeout(() => {
                btn.innerText = origText;
                btn.style.background = '#2962FF';
            }, 1500);
        } catch { alert('Copy Failed'); }
        window.getSelection()?.removeAllRanges();
    }

    window.onload = () => { 
        initExcel(); 
        autoUpdate(); 
    };
</script>
